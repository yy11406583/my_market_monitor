name: Market Monitor Daily

on:
  schedule:
    # 每日香港時間朝早 6:00 執行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 俾你隨時可以手動撳制執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製代碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝工具庫
        run: |
          pip install yfinance pandas_ta requests

      - name: 執行監控
        run: python super_monitor.py
