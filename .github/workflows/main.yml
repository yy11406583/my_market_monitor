name: Market Monitor 2026

on:
  schedule:
    # 每日香港時間朝早 6:00 執行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 俾你手動撳制測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製代碼
        uses: actions/checkout@v4  # 升級到 v4 解決警告

      - name: 設定 Python
        uses: actions/setup-python@v5  # 升級到 v5 解決警告
        with:
          python-version: '3.10'

      - name: 安裝工具庫
        run: |
          pip install yfinance pandas_ta requests

      - name: 執行監控
        run: python super_monitor.py
