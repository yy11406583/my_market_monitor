name: 2-Hour Smart Monitor V3

on:
  schedule:
    - cron: '55 */2 * * *'
  repository_dispatch:
    types: [manual_trigger]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 這裡加入了 akshare，解決你的 ModuleNotFoundError
          pip install requests beautifulsoup4 yfinance pandas lxml akshare

      - name: Execute Monitor Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python super_monitor.py

      - name: Commit and push news history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 同時處理內容和連結的紀錄檔
          touch sent_news.txt sent_links.txt
          git add sent_news.txt sent_links.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news history [skip ci]" && git push origin main)
