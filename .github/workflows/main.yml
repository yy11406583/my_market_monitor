name: 2-Hour Smart Monitor

on:
  schedule:
    # 這裡設定每 2 小時運行一次 (香港時間 08, 10, 12, 14, 16, 18, 20, 22, 00, 02, 04, 06)
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

# 必須加入權限設定，否則無法將去重用的 txt 檔存回倉庫
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 確保 checkout 時拉取最新紀錄，避免 push 衝突
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance pandas lxml

      - name: Execute Monitor Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python super_monitor.py

      - name: Commit and push news history
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 如果 sent_news.txt 不存在則創建，避免報錯
          touch sent_news.txt
          git add sent_news.txt
          # 只有在檔案有變動時才 commit，防止無謂的報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news history [skip ci]" && git push origin main)
