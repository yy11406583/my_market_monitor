name: Market Monitor 2026

on:
  schedule:
    # 每日香港時間朝早 09:00 執行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製代碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 升級到 3.12 解決兼容性問題

      - name: 安裝工具庫
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pandas_ta requests

      - name: 執行監控
        run: python super_monitor.py
