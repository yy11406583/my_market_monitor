name: 2-Hour Smart Monitor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 先裝基礎庫
          pip install requests beautifulsoup4 yfinance pandas lxml
          # 強制安裝 pandas-ta (直接從開發源安裝，解決找不到版本的問題)
          pip install "pandas-ta @ git+https://github.com/twopirllc/pandas-ta.git@development"

      - name: Execute Monitor Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python super_monitor.py
