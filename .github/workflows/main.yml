name: Market Monitor 2026

on:
  schedule:
    # 每日香港時間 08:01 執行 (UTC 00:01)
    # 避開整點高峰期，減少排隊延遲
    - cron: '1 0 * * *'
  workflow_dispatch: # 俾你隨時手動測試

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製代碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝工具庫
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pandas_ta requests

      - name: 執行監控
        run: python super_monitor.py
